<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEAO Downgrader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0a; min-height: 100vh; }
    :root {
      --bg: #0a0a0a; --border: #2a2a2a; --accent: #c8ff00;
      --text: #e8e8e8; --muted: #777;
      --font-head: 'Syne', sans-serif; --font-mono: 'Share Tech Mono', monospace;
    }
    body.light {
      --bg: #f0efe8; --border: #bbb; --accent: #3a6500;
      --text: #111; --muted: #666;
    }
    body.light html, body.light { background: #f0efe8; }
    #app { background: var(--bg); padding: 1.25rem; font-family: var(--font-mono); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
    .header {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
      margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;
    }
    .header-line { flex: 1; height: 1px; background: var(--border); }
    .theme-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 2px;
      cursor: pointer; padding: 5px 7px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.1s;
    }
    .theme-btn:hover { border-color: var(--accent); }
    .theme-btn svg { width: 14px; height: 14px; stroke: var(--text); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .current-card {
      border: 1px solid var(--accent); border-radius: 2px;
      padding: 14px 16px; margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; background: #111a00; flex-wrap: wrap;
    }
    body.light .current-card { background: #e8f5c8; }
    .current-card .left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .current-card .tag { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
    .current-card .ver { font-size: 13px; color: var(--text); word-break: break-all; }
    .current-card .date { font-size: 11px; color: var(--muted); }
    .current-card .open-btn {
      background: var(--accent); border: none; border-radius: 2px;
      color: #000; font-family: var(--font-head); font-size: 10px;
      font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 8px 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .section-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .load-status { font-size: 12px; color: var(--muted); margin-bottom: 1rem; }
    .load-status.loading { color: var(--accent); }
    .load-status.error { color: #ff4444; }
    .executor-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 2rem; }
    .executor-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 2px;
      transition: border-color 0.1s, background 0.1s;
      background: transparent; color: var(--text);
      font-family: var(--font-mono); font-size: 13px; width: 100%;
      flex-wrap: wrap;
    }
    .executor-item:hover { border-color: var(--accent); background: #1a1a0a; }
    body.light .executor-item:hover { background: #e0edcc; border-color: var(--accent); }
    .executor-item .idx { color: var(--muted); min-width: 18px; font-size: 11px; flex-shrink: 0; }
    .executor-item .name { flex: 1; min-width: 80px; font-size: 12px; }
    .executor-item .version { color: var(--muted); font-size: 10px; word-break: break-all; width: 100%; padding-left: 28px; }
    .item-btns { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }
    .dl-btn {
      background: var(--accent); border: none; border-radius: 2px;
      color: #000; font-family: var(--font-head); font-size: 10px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 12px; cursor: pointer; white-space: nowrap;
    }
    .dl-btn:hover { opacity: 0.85; }
    .site-btn {
      background: transparent; border: 1px solid var(--muted); border-radius: 2px;
      color: var(--muted); font-family: var(--font-head); font-size: 10px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 12px; cursor: pointer; white-space: nowrap;
    }
    .site-btn:hover { border-color: var(--text); color: var(--text); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      position: relative; cursor: default;
    }
    .status-dot.blue { background: #6db8ff; box-shadow: 0 0 6px #6db8ff88; }
    .status-dot.green { background: #6dff6d; box-shadow: 0 0 6px #6dff6d88; }
    .status-dot.red { background: #ff6d6d; box-shadow: 0 0 6px #ff6d6d88; }
    .status-dot .tooltip {
      display: none; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      background: #1a1a1a; border: 1px solid #333; border-radius: 2px;
      padding: 6px 10px; font-size: 11px; color: #e8e8e8; white-space: nowrap;
      z-index: 10; pointer-events: none; line-height: 1.6;
    }
    body.light .status-dot .tooltip { background: #fff; border-color: #bbb; color: #111; }
    .status-dot:hover .tooltip { display: block; }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .custom-row { display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
    .custom-input {
      flex: 1; min-width: 0; background: #000; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      padding: 10px 12px; outline: none; transition: border-color 0.1s;
    }
    body.light .custom-input { background: #fff; color: #111; }
    .custom-input:focus { border-color: var(--accent); }
    .custom-input::placeholder { color: var(--muted); }
    .go-btn {
      background: var(--accent); border: none; border-radius: 2px;
      color: #000; font-family: var(--font-head); font-size: 11px;
      font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; white-space: nowrap;
    }
    .go-btn:hover { opacity: 0.85; }
    .spinner {
      display: inline-block; width: 8px; height: 8px;
      border: 1px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #000; font-family: var(--font-mono);
      font-size: 12px; padding: 8px 20px; border-radius: 2px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; font-weight: 700;
      white-space: nowrap; max-width: 90vw;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 480px) {
      #app { padding: 1rem; }
      .item-btns { width: 100%; padding-left: 28px; margin-left: 0; }
      .dl-btn, .site-btn { flex: 1; text-align: center; padding: 8px 0; }
      .current-card { flex-direction: column; align-items: flex-start; }
      .current-card .open-btn { width: 100%; text-align: center; padding: 10px 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    weao downgrader
    <div class="header-line"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
      <svg id="theme-icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="theme-icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="section-label">current roblox version</div>
  <div id="current-card" style="display:none" class="current-card">
    <div class="left">
      <span class="tag">windows — live channel</span>
      <span class="ver" id="cur-ver"></span>
      <span class="date" id="cur-date"></span>
    </div>
    <button class="open-btn" onclick="openCurrent()">open download</button>
  </div>
  <div class="load-status loading" id="cur-status"><span class="spinner"></span>fetching current version...</div>

  <div class="divider"></div>

  <div class="section-label">by executor</div>
  <div class="load-status loading" id="list-status"><span class="spinner"></span>fetching executor list...</div>
  <div class="executor-list" id="list"></div>

  <div class="divider"></div>

  <div class="section-label">custom version hash</div>
  <div class="custom-row">
    <input class="custom-input" id="custom-input" placeholder="version-6776addb8fbc4d17" spellcheck="false" />
    <button class="go-btn" onclick="goCustom()">open</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  let currentVersion = null;

  function makeUrl(version) {
    return `https://rdd.latte.to/?channel=LIVE&binaryType=WindowsPlayer&version=${version.trim()}`;
  }
  function go(version) { window.open(makeUrl(version), '_blank'); }
  function openCurrent() { if (currentVersion) go(currentVersion); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    document.getElementById('theme-icon-sun').style.display = isLight ? 'none' : '';
    document.getElementById('theme-icon-moon').style.display = isLight ? '' : 'none';
  }

  (function() {
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('theme-icon-sun').style.display = 'none';
      document.getElementById('theme-icon-moon').style.display = '';
    }
  })();

  async function loadCurrent() {
    try {
      const r = await fetch('/api/current');
      if (!r.ok) throw new Error();
      const data = await r.json();
      currentVersion = data.Windows;
      document.getElementById('cur-ver').textContent = data.Windows;
      document.getElementById('cur-date').textContent = 'updated ' + data.WindowsDate;
      document.getElementById('cur-status').style.display = 'none';
      document.getElementById('current-card').style.display = 'flex';
    } catch(e) {
      const s = document.getElementById('cur-status');
      s.className = 'load-status error';
      s.textContent = 'failed to fetch current version.';
    }
  }

  async function loadExecutors() {
    try {
      const r = await fetch('/api/executors');
      if (!r.ok) throw new Error();
      const data = await r.json();
      const filtered = data.filter(e =>
        e.platform === 'Windows' &&
        e.rbxversion && e.rbxversion.match(/^version-/) &&
        e.extype === 'wexecutor'
      );
      const list = document.getElementById('list');
      const s = document.getElementById('list-status');
      if (!filtered.length) { s.className = 'load-status error'; s.textContent = 'no executors found.'; return; }
      s.className = 'load-status';
      s.textContent = `${filtered.length} executors available`;

      filtered.forEach((ex, i) => {
        let dotClass, tipText;
        if (!ex.updateStatus) {
          dotClass = 'red';
          tipText = 'outdated — not on current roblox version';
        } else if (ex.detected) {
          dotClass = 'green';
          tipText = 'detected — updated but flagged by hyperion';
        } else {
          dotClass = 'blue';
          tipText = 'undetected + updated — safe to use';
        }

        const row = document.createElement('div');
        row.className = 'executor-item';
        row.innerHTML = `
          <span class="idx">${i+1}</span>
          <div class="status-dot ${dotClass}"><span class="tooltip">${tipText}</span></div>
          <span class="name">${ex.title.trim()}</span>
          <span class="version">${ex.rbxversion.trim()}</span>
          <div class="item-btns">
            ${ex.websitelink ? `<button class="site-btn" onclick="window.open('${ex.websitelink}','_blank')">site</button>` : ''}
            <button class="dl-btn" onclick="go('${ex.rbxversion}')">download</button>
          </div>
        `;
        list.appendChild(row);
      });
    } catch(e) {
      const s = document.getElementById('list-status');
      s.className = 'load-status error';
      s.textContent = 'failed to fetch executor list.';
    }
  }

  function goCustom() {
    const val = document.getElementById('custom-input').value.trim();
    if (!val) { showToast('enter a version hash'); return; }
    const version = val.startsWith('version-') ? val : 'version-' + val;
    go(version);
  }

  document.getElementById('custom-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') goCustom();
  });

  loadCurrent();
  loadExecutors();
</script>
</body>
</html>
