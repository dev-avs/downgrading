<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEAO Downgrader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #161616;
      --border: #222;
      --border2: #2e2e2e;
      --accent: #c8ff00;
      --accent-dim: #8ab300;
      --text: #e8e8e8;
      --text2: #999;
      --text3: #555;
      --red: #ff5555;
      --green: #55ff88;
      --blue: #55aaff;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }
    body.light {
      --bg: #f5f0e8;
      --surface: #ede8de;
      --surface2: #e5dfd3;
      --border: #cec8bc;
      --border2: #b8b2a6;
      --accent: #3d6500;
      --accent-dim: #5a9e00;
      --text: #1a1712;
      --text2: #5a5650;
      --text3: #9a9590;
      --red: #cc2200;
      --green: #1a7a3a;
      --blue: #0055bb;
    }
    body.light { background: #f5f0e8; }

    #app { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-head); font-size: 13px; font-weight: 700;
      letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase;
    }
    .logo span { color: var(--text3); font-weight: 400; }
    .theme-btn {
      background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
      cursor: pointer; padding: 6px 8px; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .theme-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .theme-btn svg { width: 15px; height: 15px; stroke: var(--text2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .current-block { margin-bottom: 2rem; }
    .block-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 10px; font-family: var(--font-head);
    }
    .current-card {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 8px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .current-card .left { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .current-card .tag { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; font-family: var(--font-head); }
    .current-card .ver { font-size: 15px; color: var(--text); word-break: break-all; font-weight: 400; }
    .current-card .date { font-size: 11px; color: var(--text2); }
    .open-btn {
      background: var(--accent); border: none; border-radius: 6px;
      color: #000; font-family: var(--font-head); font-size: 11px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .open-btn:hover { opacity: 0.82; }

    .load-status { font-size: 12px; color: var(--text2); margin-bottom: 1rem; }
    .load-status.loading { color: var(--accent); }
    .load-status.error { color: var(--red); }

    .executor-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 2rem; }

    .executor-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      transition: border-color 0.15s, background 0.15s;
    }
    .executor-card:hover { border-color: var(--border2); background: var(--surface2); }

    .executor-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .executor-idx { font-size: 11px; color: var(--text3); min-width: 18px; flex-shrink: 0; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; position: relative; cursor: default;
    }
    .status-dot.blue { background: var(--blue); }
    .status-dot.green { background: var(--green); }
    .status-dot.red { background: var(--red); }
    .status-dot .tip {
      display: none; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px;
      padding: 5px 10px; font-size: 11px; color: var(--text); white-space: nowrap;
      z-index: 20; pointer-events: none;
    }
    .status-dot:hover .tip { display: block; }
    .executor-name { font-size: 14px; color: var(--text); flex: 1; }
    .executor-version { font-size: 10px; color: var(--text3); margin-left: auto; flex-shrink: 0; }

    .executor-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding-left: 28px; margin-bottom: 10px;
    }
    .badge {
      font-size: 10px; font-family: var(--font-head); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px; border: 1px solid;
    }
    .badge.free { color: var(--green); border-color: var(--green); background: transparent; }
    .badge.paid { color: var(--text2); border-color: var(--border2); background: transparent; }
    .badge.unc { color: var(--blue); border-color: var(--blue); background: transparent; }
    .badge.cost { color: var(--text2); border-color: var(--border2); background: transparent; }
    .unc-bar-wrap { display: flex; align-items: center; gap: 8px; padding-left: 28px; margin-bottom: 12px; }
    .unc-label { font-size: 10px; color: var(--text3); min-width: 32px; }
    .unc-bar { flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
    .unc-fill { height: 100%; background: var(--blue); border-radius: 2px; }
    .unc-pct { font-size: 10px; color: var(--text2); min-width: 28px; text-align: right; }

    .executor-btns { display: flex; gap: 6px; padding-left: 28px; flex-wrap: wrap; }
    .btn-site {
      background: transparent; border: 1px solid var(--border2); border-radius: 5px;
      color: var(--text2); font-family: var(--font-head); font-size: 10px;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-site:hover { border-color: var(--text2); color: var(--text); }
    .btn-dl {
      background: var(--accent); border: none; border-radius: 5px;
      color: #000; font-family: var(--font-head); font-size: 10px;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-dl:hover { opacity: 0.82; }

    .divider { height: 1px; background: var(--border); margin: 2rem 0; }

    .custom-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .custom-input {
      flex: 1; min-width: 0;
      background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      padding: 10px 14px; outline: none; transition: border-color 0.15s;
    }
    .custom-input::placeholder { color: var(--text3); }
    .custom-input:focus { border-color: var(--accent); }

    .spinner {
      display: inline-block; width: 8px; height: 8px;
      border: 1px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #000; font-family: var(--font-mono);
      font-size: 12px; padding: 8px 20px; border-radius: 6px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; font-weight: 700;
      white-space: nowrap; max-width: 90vw;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 500px) {
      #app { padding: 1rem 1rem 3rem; }
      .executor-version { display: none; }
      .current-card { flex-direction: column; align-items: flex-start; }
      .open-btn { width: 100%; text-align: center; }
      .executor-btns { padding-left: 0; }
      .btn-dl, .btn-site { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">WEAO <span>/</span> Downgrader</div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
      <svg id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="current-block">
    <div class="block-label">current roblox version</div>
    <div id="current-card" style="display:none" class="current-card">
      <div class="left">
        <span class="tag">windows — live channel</span>
        <span class="ver" id="cur-ver"></span>
        <span class="date" id="cur-date"></span>
      </div>
      <button class="open-btn" onclick="openCurrent()">open download</button>
    </div>
    <div class="load-status loading" id="cur-status"><span class="spinner"></span>fetching current version...</div>
  </div>

  <div class="divider"></div>

  <div class="block-label">by executor</div>
  <div class="load-status loading" id="list-status"><span class="spinner"></span>fetching executor list...</div>
  <div class="executor-list" id="list"></div>

  <div class="divider"></div>

  <div class="block-label">custom version hash</div>
  <div class="custom-row">
    <input class="custom-input" id="custom-input" placeholder="version-6776addb8fbc4d17" spellcheck="false" />
    <button class="open-btn" onclick="goCustom()">open</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  let currentVersion = null;

  function makeUrl(v) { return `https://rdd.latte.to/?channel=LIVE&binaryType=WindowsPlayer&version=${v.trim()}`; }
  function go(v) { window.open(makeUrl(v), '_blank'); }
  function openCurrent() { if (currentVersion) go(currentVersion); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function toggleTheme() {
    const light = document.body.classList.toggle('light');
    localStorage.setItem('theme', light ? 'light' : 'dark');
    document.getElementById('icon-sun').style.display = light ? 'none' : '';
    document.getElementById('icon-moon').style.display = light ? '' : 'none';
  }

  (function() {
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('icon-sun').style.display = 'none';
      document.getElementById('icon-moon').style.display = '';
    }
  })();

  async function loadCurrent() {
    try {
      const r = await fetch('/api/current');
      if (!r.ok) throw new Error();
      const d = await r.json();
      currentVersion = d.Windows;
      document.getElementById('cur-ver').textContent = d.Windows;
      document.getElementById('cur-date').textContent = 'updated ' + d.WindowsDate;
      document.getElementById('cur-status').style.display = 'none';
      document.getElementById('current-card').style.display = 'flex';
    } catch(e) {
      const s = document.getElementById('cur-status');
      s.className = 'load-status error';
      s.textContent = 'failed to fetch current version.';
    }
  }

  async function loadExecutors() {
    try {
      const r = await fetch('/api/executors');
      if (!r.ok) throw new Error();
      const data = await r.json();
      const filtered = data.filter(e =>
        e.platform === 'Windows' &&
        e.rbxversion && /^version-/.test(e.rbxversion) &&
        e.extype === 'wexecutor'
      );
      const list = document.getElementById('list');
      const s = document.getElementById('list-status');
      if (!filtered.length) { s.className = 'load-status error'; s.textContent = 'no executors found.'; return; }
      s.className = 'load-status';
      s.textContent = `${filtered.length} executors`;

      filtered.forEach((ex, i) => {
        let dotClass, tipText;
        if (!ex.updateStatus) { dotClass = 'red'; tipText = 'outdated'; }
        else if (ex.detected) { dotClass = 'green'; tipText = 'detected by hyperion'; }
        else { dotClass = 'blue'; tipText = 'undetected + updated'; }

        const uncPct = ex.uncPercentage || ex.suncPercentage || null;
        const suncPct = ex.suncPercentage || null;

        const card = document.createElement('div');
        card.className = 'executor-card';

        const siteBtnHtml = ex.websitelink
          ? `<button class="btn-site" onclick="window.open('${ex.websitelink}','_blank')">site</button>`
          : '';

        const badgesHtml = [
          ex.free ? '<span class="badge free">free</span>' : (ex.cost ? `<span class="badge cost">${ex.cost}</span>` : '<span class="badge paid">paid</span>'),
          ex.uncStatus ? '<span class="badge unc">unc</span>' : '',
          ex.decompiler ? '<span class="badge cost">decompiler</span>' : '',
          ex.multiInject ? '<span class="badge cost">multi-inject</span>' : '',
        ].join('');

        const uncBarHtml = uncPct !== null ? `
          <div class="unc-bar-wrap">
            <span class="unc-label">unc</span>
            <div class="unc-bar"><div class="unc-fill" style="width:${uncPct}%"></div></div>
            <span class="unc-pct">${uncPct}%</span>
          </div>
          ${suncPct !== null ? `<div class="unc-bar-wrap">
            <span class="unc-label">sunc</span>
            <div class="unc-bar"><div class="unc-fill" style="width:${suncPct}%"></div></div>
            <span class="unc-pct">${suncPct}%</span>
          </div>` : ''}
        ` : '';

        card.innerHTML = `
          <div class="executor-top">
            <span class="executor-idx">${i+1}</span>
            <div class="status-dot ${dotClass}"><span class="tip">${tipText}</span></div>
            <span class="executor-name">${ex.title.trim()}</span>
            <span class="executor-version">${ex.rbxversion.trim()}</span>
          </div>
          <div class="executor-meta">${badgesHtml}</div>
          ${uncBarHtml}
          <div class="executor-btns">
            ${siteBtnHtml}
            <button class="btn-dl" onclick="go('${ex.rbxversion}')">download</button>
          </div>
        `;
        list.appendChild(card);
      });
    } catch(e) {
      const s = document.getElementById('list-status');
      s.className = 'load-status error';
      s.textContent = 'failed to fetch executor list.';
    }
  }

  function goCustom() {
    const val = document.getElementById('custom-input').value.trim();
    if (!val) { showToast('enter a version hash'); return; }
    const version = val.startsWith('version-') ? val : 'version-' + val;
    go(version);
  }

  document.getElementById('custom-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') goCustom();
  });

  loadCurrent();
  loadExecutors();
</script>
</body>
</html>
